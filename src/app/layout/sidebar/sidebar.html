<div class="side">
  <div class="brand">
    <div class="logo">🖥️</div>
    <div class="text">
      <div class="title">Café System</div>
      <div class="sub">Admin Panel</div>
    </div>
  </div>

  <nav class="nav">
    <a routerLink="/admin/dashboard" routerLinkActive="active">Main Page</a>
    <a routerLink="/admin/members" routerLinkActive="active">Members</a>
    <a routerLink="/admin/computers" routerLinkActive="active">Computers</a>
    <a routerLink="/admin/payments" routerLinkActive="active">Payments</a>
    <a routerLink="/admin/reports" routerLinkActive="active">Reports</a>
  </nav>

  <div class="footer">
    <button type="button" class="logout" (click)="openLogoutModal()">Logout</button>
  </div>
</div>

<div class="modal-backdrop" *ngIf="showLogoutModal" (click)="closeLogoutModal()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <h3>Confirm Logout</h3>
    <p>Are you sure you want to log out?</p>

    <div class="modal-actions">
      <button type="button" class="cancel" (click)="closeLogoutModal()">Cancel</button>
      <button type="button" class="confirm" (click)="confirmLogout()">Logout</button>
    </div>
  </div>
</div>
