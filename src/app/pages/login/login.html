<div class="login-page">
  <div class="bg-grid"></div>

  <div class="login-wrap">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v8A2.5 2.5 0 0 1 17.5 16h-4.25v2h2a1 1 0 1 1 0 2h-6.5a1 1 0 1 1 0-2h2v-2H6.5A2.5 2.5 0 0 1 4 13.5v-8Zm2.5-.5a.5.5 0 0 0-.5.5v8c0 .276.224.5.5.5h11a.5.5 0 0 0 .5-.5v-8a.5.5 0 0 0-.5-.5h-11Z"
          />
        </svg>
      </div>

      <h1>Internet Café System</h1>
      <p>Membership & Time Tracking</p>
    </div>

    <div class="card">
      <form (ngSubmit)="onLogin()" class="form">
        <div class="field">
          <label for="username">Username</label>

          <div class="input-wrap">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4.418 0-8 2.239-8 5a1 1 0 1 0 2 0c0-1.657 2.686-3 6-3s6 1.343 6 3a1 1 0 1 0 2 0c0-2.761-3.582-5-8-5Z"
                />
              </svg>
            </span>

            <input
              id="username"
              type="text"
              placeholder="Enter your username"
              [(ngModel)]="username"
              name="username"
            />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>

          <div class="input-wrap">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4V7Zm9 12H7v-8h12v8Z"
                />
              </svg>
            </span>

            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              [(ngModel)]="password"
              name="password"
            />
          </div>
        </div>

        <div *ngIf="errorMessage" class="error-message">
          {{ errorMessage }}
        </div>

        <button class="btn" type="submit" [disabled]="isLoading">
          {{ isLoading ? 'Signing In...' : 'Sign In' }}
        </button>
      </form>

      <div class="hint">
        Use your admin account credentials
      </div>
    </div>
  </div>
</div>
