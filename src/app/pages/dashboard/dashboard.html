<div class="container">
  <h1 class="page-title">Dashboard</h1>
  <p class="page-subtitle">Welcome back! Here's what's happening today.</p>

  <div class="stats-grid">
    <div class="card stat-card" *ngFor="let s of stats">
      <div>
        <div class="stat-title">{{ s.title }}</div>
        <div class="stat-value">{{ s.value }}</div>
        <div class="stat-sub">{{ s.sub }}</div>
      </div>

      <div class="stat-icon" [ngClass]="s.type">
        {{ s.icon }}
      </div>
    </div>
  </div>

  <div class="card activity-card">
    <h2>Recent Activity</h2>

    <div class="activity-list" *ngIf="activity.length > 0; else emptyActivity">
      <div class="activity-item" *ngFor="let a of activity">
        <div class="activity-left">
          <div class="activity-icon" [ngClass]="a.type">
            {{ a.icon }}
          </div>

          <div>
            <div class="activity-name">{{ a.name }}</div>
            <div class="activity-text">{{ a.text }}</div>
          </div>
        </div>

        <div class="activity-time">{{ a.time }}</div>
      </div>
    </div>

    <ng-template #emptyActivity>
      <div class="empty-state">
        No recent activity yet.
      </div>
    </ng-template>
  </div>
</div>
