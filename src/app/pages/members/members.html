<div class="container">
  <div class="page-head">
    <div>
      <h1 class="page-title">Member Management</h1>
      <p class="page-subtitle">Manage café members and their accounts</p>
    </div>

    <button type="button" class="btn btn-primary add-btn" (click)="openModal()">
      Add Member
    </button>
  </div>

  <div class="toolbar card">
    <input
      class="input search-input"
      type="text"
      placeholder="Search by ID, name, phone, or email..."
      [(ngModel)]="searchTerm"
      (input)="onSearchChange()"
    />

    <select
      class="filter-btn"
      [(ngModel)]="selectedStatus"
      (change)="onStatusChange()"
    >
      <option value="all">All</option>
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
      <option value="in-use">In Use</option>
      <option value="blocked">Blocked</option>
    </select>
  </div>

  <div class="card table-card">
    <table class="table">
      <thead>
        <tr>
          <th>Member ID</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Remaining Time</th>
          <th>Status</th>
          <th class="actions-col">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngIf="filteredMembers.length === 0">
          <td colspan="7" style="text-align: center; padding: 24px;">
            No matching members found.
          </td>
        </tr>

        <tr *ngFor="let m of filteredMembers">
          <td>{{ m.id }}</td>
          <td>{{ m.name }}</td>
          <td>{{ m.phone || '-' }}</td>
          <td>{{ m.email || '-' }}</td>
          <td>{{ formatRemainingTime(m.remainingTime) }}</td>
          <td>
            <span
              class="status-pill"
              [ngClass]="getStatusClass(getComputedStatus(m))"
            >
              {{ getComputedStatus(m) }}
            </span>
          </td>
          <td class="actions-col">
            <button
              type="button"
              class="icon-btn delete"
              (click)="deleteMember(m.id)"
            >
              🗑️
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="modal-backdrop" *ngIf="showModal" (click)="closeModal()">
    <div class="modal-card card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>Add New Member</h2>
        <button type="button" class="close-btn" (click)="closeModal()">✕</button>
      </div>

      <div class="modal-form">
        <div class="field">
          <label>Full Name</label>
          <input
            class="input"
            placeholder="Enter member name"
            [(ngModel)]="name"
          />
        </div>

        <div class="field">
          <label>Contact Number</label>
          <input
            class="input"
            placeholder="09XXXXXXXXX"
            [(ngModel)]="contact"
          />
        </div>

        <div class="field">
          <label>Email Address</label>
          <input
            class="input"
            placeholder="member@example.com"
            [(ngModel)]="email"
          />
        </div>

        <div class="field">
          <label>Starting Time</label>
          <input
            class="input"
            type="text"
            value="0h 0m"
            disabled
          />
        </div>

        <button type="button" class="btn btn-primary full-btn" (click)="addMember()">
          Add Member
        </button>
      </div>
    </div>
  </div>
</div>
